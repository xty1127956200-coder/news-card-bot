name: Generate news cards

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate cards
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          NEWS_RSS_URLS: ${{ vars.NEWS_RSS_URLS }}
          NEWS_KEYWORDS: ${{ vars.NEWS_KEYWORDS }}
          ENABLE_PUSH: "false"
          MOCK_MODE: "false"
        run: npm run generate

      - name: Commit generated card history
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: generate news cards"
          file_pattern: web/public/cards/** public/cards/**

      - name: Install PWA dependencies
        run: npm install --prefix web

      - name: Build PWA
        run: npm run --prefix web build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send PushPlus
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          WEB_PUBLIC_CARDS_DIR: web/public/cards
          ENABLE_PUSH: "true"
          MOCK_MODE: "false"
        run: npm run push:latest
