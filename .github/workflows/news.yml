name: Generate news cards

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      MOCK_MODE: "false"
      ENABLE_PUSH: "true"
      LLM_PROVIDER: deepseek
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL || vars.PUBLIC_BASE_URL }}
      NEWS_RSS_URLS: ${{ vars.NEWS_RSS_URLS }}
      NEWS_KEYWORDS: ${{ vars.NEWS_KEYWORDS }}
      WEB_PUBLIC_CARDS_DIR: web/public/cards
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Print runtime config
        run: |
          echo "MOCK_MODE=${MOCK_MODE}"
          echo "ENABLE_PUSH=${ENABLE_PUSH}"
          echo "LLM_PROVIDER=${LLM_PROVIDER}"
          if [ -n "${PUBLIC_BASE_URL}" ]; then
            echo "PUBLIC_BASE_URL_EXISTS=true"
          else
            echo "PUBLIC_BASE_URL_EXISTS=false"
          fi

      - name: Generate cards
        run: npm run generate

      - name: Commit generated card history
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: generate news cards"
          file_pattern: web/public/cards/** public/cards/**

      - name: Install PWA dependencies
        run: npm install --prefix web

      - name: Build PWA
        run: npm run --prefix web build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send PushPlus
        run: npm run push:latest
