name: Generate news cards

on:
  schedule:
- cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      MOCK_MODE: "false"
      ENABLE_PUSH: "true"
      LLM_PROVIDER: deepseek
      NEWS_LOOKBACK_HOURS: "2"
      MAX_NEWS_CARDS: "12"
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL || vars.PUBLIC_BASE_URL }}
      NEWS_RSS_URLS: ${{ vars.NEWS_RSS_URLS }}
      NEWS_KEYWORDS: ${{ vars.NEWS_KEYWORDS }}
      WEB_PUBLIC_CARDS_DIR: web/public/cards
      PAGES_HISTORY_RESTORE_LIMIT: ${{ vars.PAGES_HISTORY_RESTORE_LIMIT || '240' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji fontconfig
          fc-cache -fv

      - name: Print available Chinese fonts
        run: |
          fc-match "Noto Sans CJK SC"
          fc-list :lang=zh | head -20

      - name: Print runtime config
        run: |
          echo "MOCK_MODE=${MOCK_MODE}"
          echo "ENABLE_PUSH=${ENABLE_PUSH}"
          echo "LLM_PROVIDER=${LLM_PROVIDER}"
          echo "NEWS_LOOKBACK_HOURS=${NEWS_LOOKBACK_HOURS}"
          echo "MAX_NEWS_CARDS=${MAX_NEWS_CARDS}"
          echo "CURRENT_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "NEWS_WINDOW_START_UTC=$(date -u -d "-${NEWS_LOOKBACK_HOURS} hours" +"%Y-%m-%dT%H:%M:%SZ")"
          echo "NEWS_WINDOW_END_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [ -n "${PUBLIC_BASE_URL}" ]; then
            echo "PUBLIC_BASE_URL_EXISTS=true"
          else
            echo "PUBLIC_BASE_URL_EXISTS=false"
          fi

      - name: Restore existing card history from GitHub Pages
        run: node scripts/restorePagesHistory.mjs

      - name: Generate cards
        run: npm run generate

      - name: Upload verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-verification-output
          path: |
            output/raw-news.json
            output/selected-news.json
            output/*.png
          if-no-files-found: warn

      - name: Install PWA dependencies
        run: npm install --prefix web

      - name: Build PWA
        run: npm run --prefix web build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send PushPlus
        run: npm run push:latest
