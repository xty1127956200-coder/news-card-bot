<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Card</title>
    <style>
      /* __CARD_CSS__ */
    </style>
  </head>
  <body>
    <main id="card"></main>
    <script>
      const data = __CARD_JSON__;
      const root = document.querySelector("#card");
      root.style.setProperty("--accent", data.accent.main);
      root.style.setProperty("--accent-2", data.accent.secondary);
      root.innerHTML = `
        <section class="shell ${data.type === "empty-state" ? "emptyState" : ""} ${data.type === "brief" ? "briefState" : ""}">
          <header class="topbar">
            <div class="labelGroup">
              <span class="category">${escapeHtml(data.category)}</span>
              <span class="window">过去2小时</span>
            </div>
            <div class="page">${escapeHtml(data.page)}</div>
          </header>

          <section class="hero">
            <div class="pulse"></div>
            ${data.sourceLine ? `<p class="sourceLine">${escapeHtml(data.sourceLine)}</p>` : ""}
            <h1>${escapeHtml(data.cardTitle)}</h1>
          </section>

          ${data.type === "brief" ? renderBriefContent(data) : renderSingleContent(data)}

          <footer>
            <div class="meta">
              <span>来源 ${escapeHtml(data.sourceName)}</span>
              <span>发布时间 ${escapeHtml(data.publishedAtText)}</span>
              <span>原文 ${escapeHtml(data.shortUrl)}</span>
              <span>范围 ${escapeHtml(data.range)}</span>
              <span>生成 ${escapeHtml(data.generatedAt)}</span>
            </div>
            <div class="progress">${progressBars(data.pageIndex, data.pageTotal)}</div>
          </footer>
        </section>
      `;

      function renderSingleContent(data) {
        return `<section class="content">
          <div class="panel coreInfo">
            <p class="panelTitle">核心信息</p>
            <ul>
              ${(data.keyPoints || []).map((point, index) => `<li><span>0${index + 1}</span>${escapeHtml(point)}</li>`).join("")}
            </ul>
            ${data.informationLimit ? `<p class="infoLimit">${escapeHtml(data.informationLimit)}</p>` : ""}
          </div>

          ${(data.whyItMatters || []).length ? `<div class="panel why">
            <p class="panelTitle">为什么重要</p>
            <ul>
              ${data.whyItMatters.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}
            </ul>
          </div>` : ""}
        </section>`;
      }

      function renderBriefContent(data) {
        return `<section class="content briefContent">
          <div class="briefList briefCount${(data.items || []).length}">
            ${(data.items || []).map((item, index) => `<article class="briefItem">
              <div class="briefItemTop">
                <span>0${index + 1}</span>
                <p>${escapeHtml(item.sourceName)} · ${escapeHtml(item.publishedAtText)}</p>
              </div>
              <h2>${escapeHtml(item.titleZh || item.originalTitle)}</h2>
              <ul>
                ${(item.keyPoints || []).map((point) => `<li>${escapeHtml(point)}</li>`).join("")}
              </ul>
              ${(item.whyItMatters || []).length ? `<div class="briefWhy">
                <p>为什么重要</p>
                <ul>
                  ${item.whyItMatters.map((point) => `<li>${escapeHtml(point)}</li>`).join("")}
                </ul>
              </div>` : ""}
            </article>`).join("")}
          </div>
          ${data.informationLimit ? `<p class="briefLimit">${escapeHtml(data.informationLimit)}</p>` : ""}
        </section>`;
      }

      function progressBars(current, total) {
        return Array.from({ length: total }, (_, index) => {
          return `<i class="${index + 1 <= current ? "active" : ""}"></i>`;
        }).join("");
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        })[char]);
      }
    </script>
  </body>
</html>
